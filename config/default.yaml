# DeepAnalyze default configuration
# ================================
#
# This file defines the LLM backends that DeepAnalyze will use.
# Each entry under `models` creates a named provider instance.
# The `defaults` section maps roles to model names.

models:
  main:
    provider: openai-compatible
    endpoint: http://localhost:11434/v1
    model: qwen2.5-14b
    maxTokens: 32768
    supportsToolUse: true

  embedding:
    provider: openai-compatible
    endpoint: http://localhost:11434/v1
    model: bge-m3
    dimension: 1024
    maxTokens: 8192

  # Example: a smaller / faster model for summarisation tasks
  # summarizer:
  #   provider: openai-compatible
  #   endpoint: http://localhost:11434/v1
  #   model: qwen2.5-7b
  #   maxTokens: 16384
  #   supportsToolUse: false

  # Example: a vision-language model for image analysis
  # vlm:
  #   provider: openai-compatible
  #   endpoint: http://localhost:11434/v1
  #   model: llava
  #   maxTokens: 8192
  #   supportsToolUse: false

defaults:
  main: main
  # summarizer: summarizer
  # vlm: vlm
  embedding: embedding
