version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "21000:21000"
    volumes:
      - deepanalyze-data:/app/data
      - ./config:/app/config:ro
    environment:
      - DATA_DIR=/app/data
      - PORT=21000
      - MODEL_CONFIG=/app/config/default.yaml
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:21000
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  deepanalyze-data:
  ollama-data:
