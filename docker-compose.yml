version: "3.8"

services:
  socat-embedding:
    image: alpine/socat:latest
    command: TCP-LISTEN:11436,fork,reuseaddr TCP:host.docker.internal:11435
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "21000:21000"
    volumes:
      - deepanalyze-data:/app/data
      - ./config:/app/config:ro
      - ./data/models:/app/data/models
    environment:
      - DATA_DIR=/app/data
      - PORT=21000
      - MODEL_CONFIG=/app/config/default.yaml
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=deepanalyze
      - PG_USER=deepanalyze
      - PG_PASSWORD=deepanalyze_dev
      - HF_ENDPOINT=https://hf-mirror.com
    depends_on:
      socat-embedding:
        condition: service_started
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:21000
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  postgres:
    build:
      context: ./config
      dockerfile: pg-zhparser.Dockerfile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=deepanalyze
      - POSTGRES_USER=deepanalyze
      - POSTGRES_PASSWORD=deepanalyze_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepanalyze -d deepanalyze"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  deepanalyze-data:
  ollama-data:
  pgdata:
